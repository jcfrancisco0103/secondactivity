<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockchain Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --card: #21262d;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Outfit", sans-serif;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      font-weight: 700;
      font-size: 1.75rem;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 2rem;
      font-size: 0.95rem;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .actions input {
      flex: 1;
      min-width: 160px;
      padding: 0.6rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
    }
    .actions input::placeholder {
      color: var(--muted);
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-family: "Outfit", sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status.valid {
      background: rgba(63, 185, 80, 0.15);
      color: var(--success);
    }
    .status.invalid {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }
    .chain-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .block-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      font-size: 0.9rem;
    }
    .block-card .index {
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .block-card .hash {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: var(--accent);
      margin: 0.5rem 0;
    }
    .block-card .data {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85rem;
      background: var(--surface);
      padding: 0.6rem;
      border-radius: 6px;
      margin-top: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .block-card .meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .error {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .loading {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Blockchain Simulator</h1>
    <p class="subtitle">Add data as new blocks. Chain is validated on each load.</p>

    <div class="actions">
      <input type="text" id="dataInput" placeholder='e.g. {"from":"Alice","to":"Bob","amount":10}' />
      <button type="button" class="btn btn-primary" id="addBlock">Add Block</button>
      <button type="button" class="btn btn-secondary" id="refresh">Refresh</button>
    </div>

    <div id="status" class="status valid">Loading…</div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="chain" class="chain-list"></div>
  </div>

  <script>
    const dataInput = document.getElementById("dataInput");
    const addBlockBtn = document.getElementById("addBlock");
    const refreshBtn = document.getElementById("refresh");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const chainEl = document.getElementById("chain");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }
    function hideError() {
      errorEl.style.display = "none";
    }

    async function loadChain() {
      chainEl.innerHTML = "<p class=\"loading\">Loading chain…</p>";
      statusEl.textContent = "Loading…";
      statusEl.className = "status";
      hideError();
      try {
        const res = await fetch("/api/chain");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load chain");
        statusEl.textContent = data.valid ? "✓ Chain valid" : "✗ Chain invalid";
        statusEl.className = "status " + (data.valid ? "valid" : "invalid");
        renderChain(data.chain);
      } catch (e) {
        showError(e.message);
        statusEl.textContent = "Error";
        statusEl.className = "status invalid";
        chainEl.innerHTML = "";
      }
    }

    function renderChain(chain) {
      chainEl.innerHTML = chain.map((block) => {
        const dataStr = typeof block.data === "object"
          ? JSON.stringify(block.data, null, 2)
          : String(block.data);
        const time = new Date(block.timestamp * 1000).toISOString();
        return `
          <div class="block-card">
            <div class="index">Block #${block.index}</div>
            <div class="hash">${escapeHtml(block.hash)}</div>
            <div class="meta">prev: ${escapeHtml(block.previousHash)} · nonce: ${block.nonce} · ${time}</div>
            <div class="data">${escapeHtml(dataStr)}</div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    addBlockBtn.addEventListener("click", async () => {
      const raw = dataInput.value.trim();
      hideError();
      let data = raw;
      if (raw.startsWith("{")) {
        try {
          data = JSON.parse(raw);
        } catch {
          showError("Invalid JSON. Use plain text or valid JSON.");
          return;
        }
      }
      if (!data) {
        showError("Enter some data (text or JSON).");
        return;
      }
      addBlockBtn.disabled = true;
      try {
        const res = await fetch("/api/block", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "Failed to add block");
        dataInput.value = "";
        await loadChain();
      } catch (e) {
        showError(e.message);
      } finally {
        addBlockBtn.disabled = false;
      }
    });

    refreshBtn.addEventListener("click", loadChain);

    loadChain();
  </script>
</body>
</html>
